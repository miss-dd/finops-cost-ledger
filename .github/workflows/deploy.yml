name: Deploy FinOps Cost Ledger

on:
  push:
    branches: [main]

# Required so GitHub can mint the OIDC token this workflow uses to authenticate to AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: my-cost-dashboard-doreen
  CLOUDFRONT_DISTRIBUTION_ID: E14QLWLEL8EN0K

jobs:
  deploy-dashboard:
    name: Deploy dashboard to S3 + invalidate CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::382975714531:role/github-actions-finops-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload dashboard files to S3
        run: |
          aws s3 cp dashboard/dashboard.html s3://${{ env.S3_BUCKET }}/dashboard.html \
            --content-type "text/html" \
            --cache-control "max-age=60"
          aws s3 cp dashboard/chart.umd.js s3://${{ env.S3_BUCKET }}/chart.umd.js \
            --content-type "application/javascript" \
            --cache-control "max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/dashboard.html" "/chart.umd.js"
