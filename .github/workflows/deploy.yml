name: Deploy FinOps Cost Ledger

on:
  push:
    branches: [main]

# Required so GitHub can mint the OIDC token this workflow uses to authenticate to AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: my-cost-dashboard-doreen
  CLOUDFRONT_DISTRIBUTION_ID: E14QLWLEL8EN0K

jobs:
  deploy-dashboard:
    name: Deploy dashboard to S3 + invalidate CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug OIDC token claims
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo $TOKEN | cut -d'.' -f2 | base64 -d 2>/dev/null | jq '{sub, aud, iss}'

      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::382975714531:role/github-actions-finops-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload dashboard.html to S3
        run: |
          aws s3 cp dashboard/dashboard.html s3://${{ env.S3_BUCKET }}/dashboard.html \
            --content-type "text/html" \
            --cache-control "max-age=60"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/dashboard.html"
